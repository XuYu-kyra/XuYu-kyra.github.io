contents:
  - title: "ROS 2 Vision System for Mobile Manipulation"
    type: "featured-project"
    period: "Jan 2026 - May 2026"
    project_type: "Team Robotics Project"
    status: "completed"
    tech_stack: ["ROS 2 Jazzy", "Python", "OpenCV", "NumPy", "vision_msgs", "RViz", "RGB-D Perception"]
    description: "Developed the vision subsystem for a mobile manipulation platform that supports white-bin search, colored block detection, 3D localization, and pick-and-place integration."
    goal: "Build a ROS 2 perception pipeline that detects bins and colored blocks from RGB-D camera data, estimates their 3D poses, and provides reliable outputs for navigation and manipulation."
    contribution: "I was responsible for the vision module in the team project. I implemented HSV-based blob detection, RGB-D projection into 3D, object classification for blocks and bins, temporal smoothing for stable detections, and RViz/debug tools to support system testing and integration."
    results:
      - "Published 2D detections and 3D object poses for downstream robotic tasks"
      - "Separated search mode white-bin detection from manipulation mode multi-color detection"
      - "Improved robustness with multi-frame confirmation and exponential moving average smoothing"
      - "Added debugging nodes for terminal summaries, RViz markers, and annotated images"
    achievements:
      - "Designed a modular ROS 2 package structure with launch files for different operating stages"
      - "Used aligned depth images and camera intrinsics to estimate object position and yaw"
      - "Implemented lightweight tracking logic to reduce false positives in noisy scenes"
      - "Documented the package clearly for reuse and future extension in the team system"
    media:
      - type: "video"
        src: "/assets/videos/main_pipeline_manual_active.mp4"
        caption: "Robot system proof video"
      - type: "image"
        src: "/assets/videos/r1.png"
        caption: "ROS 2 vision package structure"
    github: "https://github.com/Picklerick313/AERO62520_Robotic_Systems_Design_Project"
    live_demo: "https://github.com/Picklerick313/AERO62520_Robotic_Systems_Design_Project/tree/main/Xy"

